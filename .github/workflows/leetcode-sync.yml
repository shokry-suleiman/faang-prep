name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip leetcode-export

      - name: Export LeetCode solutions
        env:
          LEETCODE_COOKIES: ${{ secrets.LEETCODE_COOKIES }}
        run: |
          python -m leetcode_export \
            --cookies "$LEETCODE_COOKIES" \
            --folder solutions \
            --only-accepted \
            --only-last-submission \
            --language=javascript,typescript \
            --no-problem-statement \
            -v

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add solutions
          git commit -m "Sync LeetCode solutions" || echo "No changes to commit"
          git push
