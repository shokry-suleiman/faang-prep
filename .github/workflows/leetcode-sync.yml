name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 6:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install leetcode-export

      - name: Export LeetCode solutions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: |
          mkdir -p solutions
          leetcode-export --cookie "$LEETCODE_SESSION" --dir solutions --overwrite

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add solutions
          git commit -m "Sync LeetCode solutions" || echo "No changes to commit"
          git push
