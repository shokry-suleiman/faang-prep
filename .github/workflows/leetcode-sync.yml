name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'  # every 8 hours (00:00, 08:00, 16:00 UTC)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip leetcode-export

      - name: Run leetcode-export
        env:
          LEETCODE_COOKIE: ${{ secrets.LEETCODE_COOKIE }}
        run: |
          python -m leetcode_export \
            --cookies "$LEETCODE_COOKIE" \
            --folder solutions \
            --problem-folder-name '${question_id}-${title_slug}' \
            --no-problem-statement \
            --only-accepted \
            --only-last-submission \
            --language javascript,typescript \
            --verbose

      - name: Check for changes
        run: |
          echo "=== Git status ==="
          git status --porcelain
          echo "=== Repo root listing ==="
          ls -la
          echo "=== solutions folder listing (recursive) ==="
          ls -laR solutions/ 2>/dev/null || echo "No solutions folder or empty"

      - name: Show git diff if any
        if: always()
        run: |
          echo "=== git diff (if any) ==="
          git --no-pager diff --staged || echo "No staged diff"

      - name: Commit and push changes
        env:
          COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
        run: |
          if [ -n "$COMMIT_NAME" ] && [ -n "$COMMIT_EMAIL" ]; then
            git config user.name "$COMMIT_NAME"
            git config user.email "$COMMIT_EMAIL"
          else
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          fi

          echo "=== Attempting commit ==="
          git add solutions || true
          git commit -m "Sync LeetCode solutions" || echo "No changes to commit"
          git push || echo "Push failed"
