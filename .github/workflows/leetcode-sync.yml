name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip leetcode-export

      - name: Run leetcode-export
        env:
          LEETCODE_COOKIE: ${{ secrets.LEETCODE_COOKIE }}
        run: |
          python -m leetcode_export \
            --cookies "$LEETCODE_COOKIE" \
            --folder solutions \
            --problem-folder-name '${question_id}-${title_slug}' \
            --no-problem-statement \
            --only-accepted \
            --only-last-submission \
            --language javascript,typescript \
            --verbose
      
      - name: Commit and push changes
        env:
          COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
        run: |
          # Use provided commit name/email if available, otherwise fall back to a safe no-reply
          if [ -n "$COMMIT_NAME" ] && [ -n "$COMMIT_EMAIL" ]; then
            git config user.name "$COMMIT_NAME"
            git config user.email "$COMMIT_EMAIL"
          else
            echo "Warning: COMMIT_NAME / COMMIT_EMAIL not set. Using fallback actor no-reply email."
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          fi

          git add solutions
          git commit -m "Sync LeetCode solutions" || echo "No changes to commit"
          git push
